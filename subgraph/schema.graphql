type Collateral @entity(immutable: false) {
  id: ID! # "collIndex", e.g. "0"
  collIndex: Int!
  minCollRatio: BigInt!
  troves: [Trove!]! @derivedFrom(field: "collateral")
  addresses: CollateralAddresses! @derivedFrom(field: "collateral")
}

type CollateralAddresses @entity(immutable: true) {
  id: ID! # "collIndex", e.g. "0"
  collateral: Collateral!
  borrowerOperations: Bytes!
  sortedTroves: Bytes!
  stabilityPool: Bytes!
  token: Bytes!
  troveManager: Bytes!
  troveNft: Bytes!
}

type InterestRateBracket @entity(immutable: false) {
  id: ID! # "collIndex:rateFloored", e.g. "0:44000000000000000"
  collateral: Collateral!
  rate: BigInt!
  totalDebt: BigInt!
  sumDebtTimesRateD36: BigInt!
  pendingDebtTimesOneYearD36: BigInt!
  updatedAt: BigInt!
}

enum TroveStatus {
  active
  closed
  liquidated
  redeemed
}

type Trove @entity(immutable: false) {
  id: ID! # "collIndex:collId", e.g. 0:0x1731afc858cad2708001a4f71851f9f775729c22f47df7c4360b1e416fd0f2de
  borrower: Bytes!
  collateral: Collateral!
  closedAt: BigInt
  createdAt: BigInt!
  mightBeLeveraged: Boolean!
  status: TroveStatus!
  updatedAt: BigInt!
  lastUserActionAt: BigInt!
  debt: BigInt!
  deposit: BigInt!
  interestBatch: InterestBatch
  interestRate: BigInt!
  stake: BigInt!
  troveId: String!
  previousOwner: Bytes!
  redemptionCount: Int!
  redeemedColl: BigInt!
  redeemedDebt: BigInt!
  operations: [TroveOperation!]! @derivedFrom(field: "trove")
}

# Mirrors ITroveEvents.Operation. Order must match the contract enum so a uint8
# can be stored as the corresponding string value with no remapping.
enum TroveOperationKind {
  openTrove
  closeTrove
  adjustTrove
  adjustTroveInterestRate
  applyPendingDebt
  liquidate
  redeemCollateral
  openTroveAndJoinBatch
  setInterestBatchManager
  removeFromBatch
}

# Immutable per-operation history row. One row per TroveOperation event.
# IDs combine tx hash + log index so they are stable across reorgs.
type TroveOperation @entity(immutable: true) {
  id: Bytes! # tx hash concatenated with logIndex
  trove: Trove!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
  operation: TroveOperationKind!
  initiator: Bytes! # transaction.from
  # Signed changes from the operation itself. Excludes accrued/redistributed values.
  collateralDelta: BigInt!
  debtDelta: BigInt!
  # Post-state snapshots, captured after TroveUpdated has been applied.
  newCollateral: BigInt!
  newDebt: BigInt!
  newInterestRate: BigInt!
  # Accrued portions from redistribution. Always positive.
  collIncreaseFromRedist: BigInt!
  debtIncreaseFromRedist: BigInt!
  # Upfront borrowing fee added to debt this op (zero outside open/adjust paths).
  upfrontFee: BigInt!
  # Enriched from same-tx Redemption / Liquidation events when applicable.
  redemptionPrice: BigInt
  liquidationPrice: BigInt
  # Set when the op happened against a trove in a batch.
  batch: InterestBatch
}

type BorrowerInfo @entity(immutable: false) {
  id: ID! # "borrowerAddress", e.g. "0x0000000000000000000000000000000000000000"
  nextOwnerIndexes: [Int!]!
  troves: Int!
  trovesByCollateral: [Int!]!
}

type InterestBatch @entity(immutable: false) {
  id: ID! # "collIndex:batchManager", e.g. "0:0x0000000000000000000000000000000000000000"
  collateral: Collateral!
  batchManager: Bytes!
  debt: BigInt!
  coll: BigInt!
  annualInterestRate: BigInt!
  annualManagementFee: BigInt!
  updatedAt: BigInt!
  troves: [Trove!]! @derivedFrom(field: "interestBatch")
}
